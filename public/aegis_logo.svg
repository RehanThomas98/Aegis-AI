<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient for shield -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0FF0FC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A8FE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0652DD;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner glow gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#0FF0FC;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0652DD;stop-opacity:0" />
    </radialGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0FF0FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A8FE0;stop-opacity:0.6" />
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path for shield shape -->
    <clipPath id="shieldClip">
      <path d="M256 58 L410 120 C410 120 420 280 256 438 C92 280 102 120 102 120 Z" />
    </clipPath>
  </defs>



  <!-- Shield outline - main shape -->
  <path d="M256 72 L400 130 C400 130 410 275 256 424 C102 275 112 130 112 130 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="3" filter="url(#softGlow)" opacity="0.9" />

  <!-- Shield fill (very subtle) -->
  <path d="M256 82 L392 136 C392 136 402 272 256 414 C110 272 120 136 120 136 Z"
        fill="url(#shieldGrad)" opacity="0.08" />

  <!-- Central AI "eye" / node -->
  <circle cx="256" cy="230" r="36" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" filter="url(#glow)" />
  <circle cx="256" cy="230" r="18" fill="url(#shieldGrad)" opacity="0.9" filter="url(#glow)" />
  <circle cx="256" cy="230" r="6" fill="#0FF0FC" />

  <!-- Neural network lines radiating from center -->
  <!-- Top -->
  <line x1="256" y1="194" x2="256" y2="120" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7" />
  <circle cx="256" cy="115" r="4" fill="#0FF0FC" opacity="0.8" />

  <!-- Top-left -->
  <line x1="228" y1="206" x2="170" y2="155" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6" />
  <circle cx="167" cy="152" r="3.5" fill="#0FF0FC" opacity="0.7" />

  <!-- Top-right -->
  <line x1="284" y1="206" x2="342" y2="155" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6" />
  <circle cx="345" cy="152" r="3.5" fill="#0FF0FC" opacity="0.7" />

  <!-- Left -->
  <line x1="220" y1="230" x2="148" y2="230" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  <circle cx="144" cy="230" r="3" fill="#0FF0FC" opacity="0.6" />

  <!-- Right -->
  <line x1="292" y1="230" x2="364" y2="230" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  <circle cx="368" cy="230" r="3" fill="#0FF0FC" opacity="0.6" />

  <!-- Bottom-left -->
  <line x1="234" y1="258" x2="185" y2="310" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  <circle cx="182" cy="313" r="3" fill="#0FF0FC" opacity="0.6" />

  <!-- Bottom-right -->
  <line x1="278" y1="258" x2="327" y2="310" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  <circle cx="330" cy="313" r="3" fill="#0FF0FC" opacity="0.6" />

  <!-- Bottom center -->
  <line x1="256" y1="266" x2="256" y2="340" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  <circle cx="256" cy="344" r="3" fill="#0FF0FC" opacity="0.6" />

  <!-- Secondary connection lines (node to node) -->
  <line x1="167" y1="152" x2="144" y2="230" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="345" y1="152" x2="368" y2="230" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="144" y1="230" x2="182" y2="313" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="368" y1="230" x2="330" y2="313" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="256" y1="115" x2="167" y2="152" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="256" y1="115" x2="345" y2="152" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="182" y1="313" x2="256" y2="344" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />
  <line x1="330" y1="313" x2="256" y2="344" stroke="#0A8FE0" stroke-width="0.8" opacity="0.25" />

  <!-- Text: AEGIS -->
  <text x="256" y="400" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="12" fill="url(#shieldGrad)" filter="url(#glow)">AEGIS</text>
  
  <!-- Subtext -->
  <text x="256" y="425" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" letter-spacing="5" fill="#0A8FE0" opacity="0.7">CRISIS COORDINATOR</text>

</svg>